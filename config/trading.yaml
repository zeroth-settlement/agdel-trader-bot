agdel:
  autoBuy: false
  budget:
    maxCostPerSignalUsdc: 2.0
    maxDailySpendUsdc: 250.0
    maxHourlySpendUsdc: 50.0
  enabled: true
  makerFilters:
    blockedSignalTypes:
    - basis
    - bb-reversal
    minWinRate: 0.1
  selection:
    targetHorizons:
      15m: 8
      5m: 6
agentPipeline:
  fallbackModels:
  - gpt-4o
  maxTokens: 1000
  minDecisionIntervalMs: 300000
  minProfitToFeeRatio: 2.0
  model: claude-sonnet-4-6
  temperature: 0.05
autoTrade:
  enabled: false
  stopLoss:
    fixedPct: 0.06
    mode: trailing
    trailingPct: 0.03
  takeProfit:
    fixedPct: 0.08
    trailingPct: 0.04
bounceTrigger:
  enabled: false
reflection:
  enabled: true
  intervalSeconds: 1800
  minSignalsForReflection: 5
  minTradesForReflection: 3
sentimentBias:
  enabled: true
signalFeed:
  auth: pyrana:pyrana
  baseUrl: https://agdel-signal-bots.demo.pyrana.ai
  enabled: true
  pollIntervalSeconds: 10
trading:
  assets:
  - ETH
  enable: true
  loopIntervalMs: 5000
  paperStartingBalanceUsd: 2000
